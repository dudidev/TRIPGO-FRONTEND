<div class="forgot-password-container">
    <div class="forgot-password-card">

        <!-- Header -->
        <div class="header">
            <div class="logo">
                <h1>Trip<span>GO</span></h1>
            </div>
            <h2>¿Olvidaste tu contraseña?</h2>
            <p class="subtitle">
                No te preocupes, te enviaremos instrucciones para recuperarla
            </p>
        </div>

        <!-- Success Message -->
        <div *ngIf="successMessage()" class="alert alert-success">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                <polyline points="22 4 12 14.01 9 11.01"></polyline>
            </svg>
            <div>
                <strong>¡Listo!</strong>
                <p>{{ successMessage() }}</p>
            </div>
        </div>

        <!-- Error Message -->
        <div *ngIf="errorMessage()" class="alert alert-error">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="12"></line>
                <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
            <p>{{ errorMessage() }}</p>
        </div>

        <!-- Form -->
        <form [formGroup]="forgotPasswordForm" (ngSubmit)="onSubmit()" *ngIf="!successMessage()">

            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" formControlName="correo_usuario" placeholder="tucorreo@example.com"
                    [class.is-invalid]="submitted() && f['correo_usuario'].errors" />
                <div *ngIf="submitted() && f['correo_usuario'].errors" class="invalid-feedback">
                    <span *ngIf="f['correo_usuario'].errors['required']">
                        El correo es requerido
                    </span>
                    <span *ngIf="f['correo_usuario'].errors['email']">
                        Ingresa un correo válido
                    </span>
                </div>
            </div>

            <button type="submit" class="btn-primary" [disabled]="loading()">
                <span *ngIf="!loading()">Enviar Enlace de Recuperación</span>
                <span *ngIf="loading()" class="loading">
                    <span class="spinner"></span>
                    Enviando...
                </span>
            </button>

        </form>

        <!-- Back to Login -->
        <div class="footer">
            <button type="button" class="btn-link" (click)="goToLogin()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                Volver al inicio de sesión
            </button>
        </div>

    </div>
</div>
