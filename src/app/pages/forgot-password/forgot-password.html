<div class="forgot-password-container">
  <div class="forgot-password-card">

    <!-- Header -->
    <div class="header">
      <div class="logo">Trip<span>GO</span></div>

      <div class="lock-icon">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>

      <h2>¿Olvidaste tu contraseña?</h2>
      <p class="subtitle">Ingresa tu correo y te enviaremos un enlace para restablecerla</p>
    </div>

    <!-- Success Message -->
    <div *ngIf="successMessage()" class="alert alert-success">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
        <polyline points="22 4 12 14.01 9 11.01"/>
      </svg>
      <div>
        <strong>¡Listo!</strong>
        <p>{{ successMessage() }}</p>
      </div>
    </div>

    <!-- Error Message -->
    <div *ngIf="errorMessage()" class="alert alert-error">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <p>{{ errorMessage() }}</p>
    </div>

    <!-- Form -->
    <form [formGroup]="forgotPasswordForm" (ngSubmit)="onSubmit()" *ngIf="!successMessage()">

      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <div class="input-wrapper">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          <input
            type="email"
            id="email"
            formControlName="correo_usuario"
            placeholder="tucorreo@example.com"
            [class.is-invalid]="submitted() && f['correo_usuario'].errors"
          />
        </div>
        <div *ngIf="submitted() && f['correo_usuario'].errors" class="invalid-feedback">
          <span *ngIf="f['correo_usuario'].errors['required']">El correo es requerido</span>
          <span *ngIf="f['correo_usuario'].errors['email']">Ingresa un correo válido</span>
        </div>
      </div>

      <button type="submit" class="btn-primary" [disabled]="loading()">
        <span *ngIf="!loading()">Enviar enlace de recuperación</span>
        <span *ngIf="loading()" class="loading">
          <span class="spinner"></span>
          Enviando...
        </span>
      </button>

    </form>

    <!-- Divider -->
    <div class="divider" *ngIf="!successMessage()">
      <span>o vuelve a</span>
    </div>

    <!-- Back to Login -->
    <div class="footer">
      <button type="button" class="btn-back" (click)="goToLogin()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"/>
          <polyline points="12 19 5 12 12 5"/>
        </svg>
        Inicio de sesión
      </button>
    </div>

  </div>
</div>
